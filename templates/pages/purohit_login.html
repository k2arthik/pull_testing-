{% extends 'base.html' %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/auth.css' %}">
<style>
    .auth-card {
        border-top: 5px solid #d4af37;
        /* Gold border for Purohit */
    }

    .auth-header h2 {
        color: #8b4513;
    }
</style>
{% endblock %}

{% block content %}
<section class="auth-section" style=" background: linear-gradient(rgba(255, 252, 245, 0.92), rgba(255, 252, 245, 0.92)), url('/static/images/bgdesign2.jpeg');
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        position: relative;">
    <div class="auth-card">
        <div class="auth-header">
            <h2>Purohit Sign In</h2>
            <p>Access your priest dashboard</p>
        </div>



        <form class="auth-form" method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label for="login_id">Mobile Number or Email</label>
                <input type="text" id="login_id" name="login_id" placeholder="Enter your 10-digit mobile number or registered email" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter password" required>
            </div>

            <div style="text-align: right; margin-bottom: 20px;">
                <a href="{% url 'purohit_forgot_password' %}"
                    style="color: #d4af37; text-decoration: none; font-size: 0.9rem;">Forgot Password?</a>
            </div>

            <button type="submit" class="btn-auth">Sign In to Portal</button>
        </form>

        <div class="auth-footer">
            Want to join as a Purohit? <a href="{% url 'purohit_signup' %}">Register Here</a>
        </div>
    </div>
</section>
{% endblock %}
