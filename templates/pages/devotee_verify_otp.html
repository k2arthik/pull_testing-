{% extends 'base.html' %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/auth.css' %}">
{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="auth-card">
        <div class="auth-header">
            <h2>Verify OTP</h2>
            <p>Enter the 6-digit OTP sent to your registered email.</p>
        </div>

        {% if messages %}
        <div class="messages">
            {% for message in messages %}
            <div class="alert {% if message.tags %}alert-{{ message.tags }}{% endif %}">
                {{ message }}
            </div>
            {% endfor %}
        </div>
        {% endif %}

        <form class="auth-form" method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label for="otp">One Time Password (OTP)</label>
                <input type="text" id="otp" name="otp" placeholder="Enter 6-digit OTP" required maxlength="6"
                    style="letter-spacing: 5px; text-align: center; font-size: 1.2rem;">
            </div>

            <button type="submit" class="btn-auth">Verify OTP</button>
        </form>

        <div class="auth-footer">
            <a href="{% url 'login' %}">Cancel</a>
        </div>
    </div>
</section>

<script>
    document.getElementById("otp").addEventListener("input", function () {
        this.value = this.value.replace(/[^0-9]/g, '');
    });
</script>
{% endblock %}
