{% extends 'base.html' %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/blogs.css' %}">
<style>
    .blog-detail-container {
        max-width: 900px;
        margin: 0 auto;
        padding: 50px 20px;
    }

    .blog-meta-top {
        display: flex;
        gap: 15px;
        align-items: center;
        margin-bottom: 20px;
        color: #D4AF37;
        font-family: 'Cinzel', serif;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1px;
        font-size: 0.9rem;
    }

    .blog-title-main {
        font-family: 'Rozha One', serif;
        font-size: 3rem;
        color: #800000;
        margin-bottom: 30px;
        line-height: 1.2;
    }

    .blog-featured-image {
        width: 100%;
        height: 500px;
        object-fit: cover;
        border-radius: 15px;
        margin-bottom: 40px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
    }

    .blog-content-body {
        font-family: 'Inter', sans-serif;
        font-size: 1.1rem;
        line-height: 1.8;
        color: #333;
    }

    .blog-content-body h4 {
        font-family: 'Cinzel', serif;
        color: #800000;
        margin: 40px 0 20px;
        font-size: 1.5rem;
    }

    .blog-content-body p {
        margin-bottom: 25px;
    }

    .blog-content-body ul {
        margin-bottom: 25px;
        padding-left: 20px;
    }

    .blog-content-body li {
        margin-bottom: 10px;
    }

    .back-to-blogs {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        color: #800000;
        text-decoration: none;
        font-family: 'Cinzel', serif;
        font-weight: bold;
        margin-bottom: 30px;
        transition: 0.3s;
    }

    .back-to-blogs:hover {
        color: #D4AF37;
        transform: translateX(-5px);
    }

    @media (max-width: 768px) {
        .blog-title-main {
            font-size: 2.2rem;
        }

        .blog-featured-image {
            height: 300px;
        }
    }
</style>
{% endblock %}

{% block content %}
<div style="background-color: #fefcf5; min-height: 100vh;">
    {% include 'cms/blogs/blog_detail_content.html' %}
</div>
{% endblock %}
