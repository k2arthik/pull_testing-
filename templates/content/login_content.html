{% load static %}
<section class="auth-section" style=" background: linear-gradient(rgba(255, 252, 245, 0.92), rgba(255, 252, 245, 0.92)), url('/static/images/bgdesign2.jpeg');
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        position: relative;">

    <div class="auth-card">
        <div class="auth-header">
            <h2>Welcome Back</h2>
            <p>Sign in to your spiritual account</p>
        </div>



        <form class="auth-form" method="POST">
            {% csrf_token %}
            {% if next %}<input type="hidden" name="next" value="{{ next }}">{% endif %}
            <div class="form-group">
                <label for="login_id">Mobile Number or Email</label>
                <input type="text" id="login_id" name="login_id" placeholder="Enter your 10-digit mobile number or email" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>

            <div class="form-group d-flex justify-content-between align-items-center">
                <a href="{% url 'devotee_forgot_password' %}"
                    style="color: #d4af37; text-decoration: none; font-size: 0.9rem;">Forgot
                    Password?</a>
            </div>

            <button type="submit" class="btn-auth">Sign In</button>
        </form>


        <!-- Optional Social Login Placeholders/Buttons could go here -->

        <div class="auth-footer">
            Don't have an account? <a href="{% url 'signup' %}">Sign Up</a>
        </div>
    </div>
</section>
