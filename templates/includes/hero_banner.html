{% load static %}
<style>
    .dash-hero {
        background: #800000;
        background-image: url("data:image/svg+xml,%3Csvg width='120' height='120' viewBox='0 0 120 120' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M60 15L15 60l45 45 45-45z' fill='%23600000' fill-opacity='0.4'/%3E%3C/svg%3E");
        padding: 140px 20px 160px;
        text-align: center;
        color: #FFFFFF;
        position: relative;
        overflow: hidden;
    }

    .hero-om {
        font-family: "Times New Roman", Times, serif !important;
        font-size: 2.5rem;
        color: #D4AF37;
        display: block;
        margin-bottom: 15px;
    }

    .dash-hero h1 {
        font-family: "Times New Roman", Times, serif !important;
        font-size: 3rem;
        text-transform: uppercase;
        letter-spacing: 4px;
        margin: 0 0 15px;
        color: white;
    }

    .dash-hero p {
        font-family: "Times New Roman", Times, serif !important;
        font-size: 1.1rem;
        font-style: italic;
        opacity: 0.85;
        margin: 0;
    }

    .hero-wave {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        line-height: 0;
    }

    .hero-wave svg {
        display: block;
        width: 130%;
        height: 80px;
        fill: #FDF9F0;
    }

    .section-divider {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 20px;
        margin: 40px auto 50px;
        max-width: 400px;
    }

    .divider-line {
        height: 1px;
        flex: 1;
        background: linear-gradient(to right, transparent, rgba(212, 175, 55, 0.5), transparent);
    }

    .divider-symbol {
        color: #800000;
        font-size: 1.1rem;
        font-family: "Times New Roman", Times, serif !important;
        background: #FDF9F0;
        padding: 4px 12px;
        border: 1px solid rgba(212, 175, 55, 0.4);
        border-radius: 20px;
        font-weight: 700;
        letter-spacing: 2px;
    }
</style>

<div class="dash-hero">
    <span class="hero-om">ॐ</span>
    <h1>{{ title }}</h1>
    <p>{{ subtitle }}</p>
    <div class="hero-wave">
        <svg viewBox="0 0 500 150" preserveAspectRatio="none">
            <path d="M0.00,49.98 C149.99,150.00 349.20,-49.98 500.00,49.98 L500.00,150.00 L0.00,150.00 Z"></path>
        </svg>
    </div>
</div>

<div class="section-divider">
    <div class="divider-line"></div>
    <span class="divider-symbol">ॐ</span>
    <div class="divider-line"></div>
</div>
