        color: #d9a95b;
        font-size: 18px;
        letter-spacing: 2px;
        margin-bottom: 30px;
    }

    /* GOLD DOT DIVIDER */

    .divider-gold-dots {
        width: 70%;
        margin: 25px auto 60px;
        height: 6px;
        background: radial-gradient(circle, #d4a24a 2px, transparent 3px);
        background-size: 18px 6px;
    }

    /* GRID */

    .sankalp-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 35px;
        max-width: 1200px;
        margin: auto;
        margin-bottom: 40px;
    }

    /* CARD */

    .vow-card {
        background: linear-gradient(#dfb539, #f7be15);
        border-radius: 14px;
        padding: 40px 30px;
        position: relative;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
        transition: 0.35s;
    }

    .vow-card:hover {
        transform: translateY(-10px);
    }

    /* TITLE */

    .vow-title {
        color: #6d2619;
        font-size: 28px;
        margin-bottom: 5px;
    }

    /* SUBTITLE */

    .vow-subtitle {
        color: #840606;
        text-transform: uppercase;
        letter-spacing: 2px;
        font-size: 14px;
        margin-bottom: 18px;
    }

    /* TEXT */

    .vow-text {
        color: #3b2c24;
        line-height: 1.6;
        font-size: 15px;
    }

    h2 {
        display: flex;
        justify-content: center;
        align-items: center;
    }
