<!-- ===================================== -->
<!-- SACRED SERVICES (ARCHANA) SECTION -->
<!-- ===================================== -->
{% load static %}
<section class="sacred-services" id="pooja-services">

    <!-- Dark Temple Wall Background -->
    <div class="temple-wall-bg"></div>

    <div class="container" style="position: relative; z-index: 5;">

        <!-- Header -->
        <div class="services-header">
            <span class="sub-heading">Sacred Offerings</span>
            <h2 class="main-heading" style="font-family: 'Cinzel', serif;">Divine Pooja Services </h2>
            <div class="header-ornament">
                <span class="ornament-line"></span>
                <span class="ornament-symbol">ॐ</span>
                <span class="ornament-line"></span>
            </div>
        </div>

        <!-- Services Grid (Gallery Style) -->
        <div class="service-gallery-grid">
            {% for service in featured_services %}
            <div class="service-frame">
                <div class="frame-inner">
                    <img src="{% if service.image %}{{ service.image }}{% else %}{% static 'images/poojaser.png' %}{% endif %}"
                        alt="{{ service.title }}" class="service-img">
                    <div class="service-overlay">
                        <div class="overlay-content">
                            <h3>{{ service.title }}</h3>
                            <a href="{% url 'service_detail' service_slug=service.slug %}" class="btn-service">Book Seva</a>
                        </div>
                    </div>
                </div>
            </div>
            {% empty %}
            <div style="color:#F5E8BF; text-align:center; grid-column: 1 / -1;">
                Services will appear here once they are added.
            </div>
            {% endfor %}
        </div>

        <!-- View All Button -->
        <div style="text-align: center; margin-top: 60px;">
            <a href="/services/" class="btn-view-all">
                <span>View All Services</span>
                <i class="fas fa-arrow-right"></i>
            </a>
        </div>

    </div>
</section>

<style>
    .sacred-services {
        position: relative;
        padding: 80px 0;
        background: linear-gradient(rgba(132, 6, 6, 0.9), rgba(132, 6, 6, 0.95));
        overflow: hidden;
    }

    /* Temple Wall Texture */
    .temple-wall-bg {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: url('/static/images/bgdesign2.jpeg');
        background-size: cover;
        background-attachment: fixed;
        z-index: 1;
        opacity: 0.15;
        mix-blend-mode: overlay;
    }

    /* Header Styling */
    .services-header {
        text-align: center;
        margin-bottom: 70px;
    }

    .sub-heading {
        font-family: 'Cinzel', serif;
        color: #D4AF37;
        letter-spacing: 4px;
        text-transform: uppercase;
        font-size: 0.9rem;
        display: block;
        margin-bottom: 10px;
    }

    .main-heading {
        font-family: 'Rozha One', serif;
        color: #f8e6c8;
        font-size: 3rem;
        margin-bottom: 20px;
    }

    .text-gold {
        color: #D4AF37;
        text-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
    }

    .header-ornament {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 15px;
    }

    .ornament-line {
        height: 1px;
        width: 80px;
        background: linear-gradient(90deg, transparent, #D4AF37, transparent);
    }

    .ornament-symbol {
        color: #FF9933;
        font-size: 1.5rem;
    }

    /* --- Service Gallery Grid --- */
    .service-gallery-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 20px;
        padding: 0 20px;
        max-width: 1400px;
        margin: 0 auto;
    }

    /* --- Service Frame --- */
    .service-frame {
        background: linear-gradient(145deg, #B71C1C, #1a0505);
        padding: 10px;
        /* The Frame */
        border-radius: 10px;
        box-shadow:
            0 10px 30px rgba(0, 0, 0, 0.5),
            inset 0 0 20px rgba(0, 0, 0, 0.8);
        border: 1px solid #D32F2F;
        transition: transform 0.4s ease;

    }

    .service-frame:hover {
        transform: translateY(-8px);
        border-color: #D32F2F;
        box-shadow: 0 15px 40px rgba(183, 28, 28, 0.2);
    }

    .frame-inner {
        position: relative;
        width: 100%;
        height: 340px;
        overflow: hidden;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: #000;
    }

    .service-img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        opacity: 1;
        transition: transform 1s ease;
    }

    .service-frame:hover .service-img {
        transform: scale(1.05);
    }

    /* --- Overlay Content --- */
    .service-overlay {
        position: absolute;
        inset: 0;
        background: linear-gradient(to top, rgba(0, 0, 0, 0.7) 0%, transparent 60%);
        display: flex;
        align-items: flex-end;
        padding: 20px;
        transition: opacity 0.4s ease;
    }

    .service-frame:hover .service-overlay {
        background: linear-gradient(to top, rgba(183, 28, 28, 0.8) 0%, transparent 100%);
    }

    .overlay-content {
        transform: translateY(10px);
        transition: transform 0.4s ease;
        text-align: center;
        width: 100%;
    }

    .service-frame:hover .overlay-content {
        transform: translateY(0);
    }

    .sanskrit-tag {
        display: inline-block;
        font-family: 'Noto Sans Devanagari', sans-serif;
        color: #FF9933;
        font-size: 1rem;
        margin-bottom: 10px;
        letter-spacing: 1px;
    }

    .overlay-content h3 {
        font-family: 'Rozha One', serif;
        color: #fff;
        font-size: 1.6rem;
        margin-bottom: 20px;
        line-height: 1.2;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
        min-height: 3.6rem;
    }

    .btn-service {
        display: inline-block;
        padding: 10px 25px;
        background: transparent;
        border: 1px solid #D4AF37;
        color: #D4AF37;
        font-family: 'Cinzel', serif;
        text-transform: uppercase;
        font-size: 0.8rem;
        letter-spacing: 2px;
        text-decoration: none;
        transition: all 0.4s;
        border-radius: 4px;
    }

    .btn-service:hover {
        background: #D4AF37;
        color: #2c0e0e;
        box-shadow: 0 0 15px rgba(212, 175, 55, 0.6);
        transform: scale(1.05);
    }

    /* --- View All Button --- */
    .btn-view-all {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        padding: 18px 45px;
        border: 2px solid #D4AF37;
        color: #F5E8BF;
        background: transparent;
        border-radius: 50px;
        text-decoration: none;
        font-family: 'Cinzel', serif;
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 2px;
        transition: all 0.4s;
        position: relative;
        overflow: hidden;
        z-index: 1;
    }

    .btn-view-all:hover {
        color: #2c0e0e;
        background: #D4AF37;
        box-shadow: 0 0 30px rgba(212, 175, 55, 0.4);
    }

    @media (max-width: 768px) {
        .main-heading {
            font-size: 2.2rem;
        }

        .service-gallery-grid {
            grid-template-columns: 1fr;
        }

        .frame-inner {
            height: 350px;
        }
    }
</style>
