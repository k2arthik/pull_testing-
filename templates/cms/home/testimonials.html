<!-- ===================================== -->
<!-- VOICE OF DEVOTEES (TESTIMONIALS) -->
<!-- ===================================== -->

<section class="devotee-stories">

    <div class="divine-pattern-bg"></div>

    <div class="container" style="position: relative; z-index: 2; max-width: 900px;">

        <div class="stories-header">
            <h2 class="stories-title" style="color:#D4AF37; font-family: 'Cinzel', serif;">CLIENT TESTIMONIALS<span
                    class="text-gold"> </span></h2>
            <div class="ornamental-divider">
                <span class="ornament-left">~~~~~~~~~</span>
                <span class="ornament-center">✾</span>
                <span class="ornament-right">~~~~~~~~~</span>
            </div>
        </div>

        <!-- The Scroll Container -->
        <div class="scroll-wrapper">

            <div class="scroll-handle top-handle"></div>

            <div class="scroll-paper">

                <!-- Swiper -->
                <div class="swiper testimonial-slider">
                    <div class="swiper-wrapper">

                        {% for t in testimonials %}
                        <!-- Slide {{ forloop.counter }} -->
                        <div class="swiper-slide">
                            <div class="story-content">
                                <div class="quote-icon"><i class="fas fa-quote-left"></i></div>
                                <p class="story-text">
                                    {{ t.text }}
                                </p>
                                <div class="devotee-profile">
                                    <div class="devotee-img">
                                        {% if t.image %}
                                        <img src="{{ t.image.url }}" alt="{{ t.name }}">
                                        {% else %}
                                        <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=150&q=80"
                                            alt="{{ t.name }}">
                                        {% endif %}
                                    </div>
                                    <div class="devotee-info">
                                        <h4>{{ t.name }}</h4>
                                        <span>{{ t.location }}</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                        {% empty %}
                        <div class="swiper-slide">
                            <div class="story-content">
                                <p class="story-text">Devotee stories are being shared...</p>
                            </div>
                        </div>
                        {% endfor %}

                    </div>

                    <!-- Custom Navigation -->
                    <div class="story-nav">
                        <div class="story-prev"><i class="fas fa-arrow-left"></i></div>
                        <div class="story-pagination"></div>
                        <div class="story-next"><i class="fas fa-arrow-right"></i></div>
                    </div>

                </div>

            </div>

            <div class="scroll-handle bottom-handle"></div>
        </div>

    </div>
</section>

<style>
    .devotee-stories {
        padding: 100px 0;
        background: linear-gradient(rgba(255, 248, 225, 0.8), rgba(255, 248, 225, 0.8)), url('/static/images/bgdesign2.jpeg');
        background-size: cover;
        background-attachment: fixed;
        position: relative;
        overflow: hidden;
    }

    .divine-pattern-bg {
        position: absolute;
        inset: 0;
        background-image: url('https://www.transparenttextures.com/patterns/natural-paper.png');
        opacity: 0.15;
        pointer-events: none;
        mix-blend-mode: overlay;
    }

    /* --- Header --- */
    .stories-header {
        text-align: center;
        margin-bottom: 50px;
    }

    .stories-title {
        font-family: 'Rozha One', serif;
        font-size: 3rem;
        color: #f8e6c8;
        margin-bottom: 10px;
        text-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
    }

    .text-gold {
        color: #D4AF37;
    }

    .ornamental-divider {
        font-family: 'Cinzel', serif;
        color: #D4AF37;
        font-size: 1.2rem;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
    }

    /* --- Scroll Wrapper --- */
    .scroll-wrapper {
        position: relative;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
        margin: 0 auto;
    }

    /* Handles (Top & Bottom of Scroll) */
    .scroll-handle {
        height: 30px;
        background: radial-gradient(circle, #D32F2F 0%, #B71C1C 100%);
        border-radius: 5px;
        position: relative;
        z-index: 5;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
    }

    .scroll-handle::after {
        /* Gold tips */
        content: '';
        position: absolute;
        top: 0;
        bottom: 0;
        width: 40px;
        background: linear-gradient(to right, #D4AF37, #FFD700, #D4AF37);
    }

    .scroll-handle::before {
        content: '';
        position: absolute;
        top: 0;
        bottom: 0;
        right: 0;
        width: 40px;
        background: linear-gradient(to right, #D4AF37, #FFD700, #D4AF37);
        z-index: 2;
    }

    .scroll-paper {
        background: #fff;
        padding: 30px 20px;
        border-left: 20px solid #f0e6d2;
        /* Scroll edge effect */
        border-right: 20px solid #f0e6d2;
        background-image: url('https://www.transparenttextures.com/patterns/cream-paper.png');
    }

    /* --- Story Content --- */
    .story-content {
        text-align: center;
        padding: 0 20px;
    }

    .quote-icon {
        font-size: 2.5rem;
        color: #D4AF37;
        margin-bottom: 25px;
        opacity: 0.5;
    }

    .story-text {
        font-family: 'Playfair Display', serif;
        font-style: italic;
        font-size: 1.15rem;
        color: #555;
        line-height: 1.6;
        margin-bottom: 20px;
        max-width: 800px;
        margin-left: auto;
        margin-right: auto;
    }

    .devotee-profile {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 20px;
    }

    .devotee-img {
        width: 55px;
        height: 55px;
        border-radius: 50%;
        overflow: hidden;
        border: 2px solid #D4AF37;
        padding: 3px;
        /* gold rim gap */
        background: #fff;
    }

    .devotee-img img {
        width: 100%;
        height: 100%;
        border-radius: 50%;
        object-fit: cover;
    }

    .devotee-info h4 {
        font-family: 'Cinzel', serif;
        color: #B71C1C;
        font-size: 1.1rem;
        margin-bottom: 5px;
    }

    .devotee-info span {
        font-family: 'Inter', sans-serif;
        color: #888;
        font-size: 0.85rem;
    }

    /* --- Navigation --- */
    .story-nav {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 30px;
        margin-top: 40px;
    }

    .story-prev,
    .story-next {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 1px solid #D4AF37;
        color: #D4AF37;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.3s;
    }

    .story-prev:hover,
    .story-next:hover {
        background: #D4AF37;
        color: #fff;
    }

    .swiper-pagination-bullet {
        background: #ddd;
        opacity: 1;
    }

    .swiper-pagination-bullet-active {
        background: #D32F2F;
    }
</style>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        var swiper = new Swiper(".testimonial-slider", {
            slidesPerView: 1,
            effect: 'fade',
            fadeEffect: { crossFade: true },
            loop: true,
            autoplay: {
                delay: 6000,
                disableOnInteraction: false,
            },
            pagination: {
                el: ".story-pagination",
                clickable: true,
            },
            navigation: {
                nextEl: ".story-next",
                prevEl: ".story-prev",
            },
        });
    });
</script>
